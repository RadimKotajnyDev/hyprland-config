# hyprpaper - https://wiki.hypr.land/Hypr-Ecosystem/hyprpaper/
#
# This is hyprlang, not Lua: hyprpaper is a separate program from the compositor
# and still uses its own .conf format.
#
# hyprpaper 0.8 changed the schema. The old `preload = ...` + `wallpaper = MON, path`
# form is gone -- `wallpaper` is now a block keyed by monitor. The old syntax is not
# an error, it is silently ignored, and you just get no wallpaper.
#
# Paths must be absolute; ~ is not expanded here.

wallpaper {
    monitor  = DP-1
    path     = /home/radimkotajny/Pictures/fallout-4-3440x1440-24489.jpg
    # Image is natively 3440x1440, so on DP-1 this is a 1:1 blit, no scaling.
    fit_mode = cover
}

wallpaper {
    monitor  = HDMI-A-1
    path     = /home/radimkotajny/Pictures/fallout-4-3440x1440-24489.jpg
    # 21:9 image on a 16:9 monitor -- cover crops the sides to fill.
    fit_mode = cover
}

splash = 0
ipc    = 1
